version: "3.8"

services:
  # Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_WS_DEBUG=${VITE_WS_DEBUG:-false}
        - VITE_WS_AUTO_CONNECT=${VITE_WS_AUTO_CONNECT:-true}
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: WebSocket Server (if you want to run it in Docker too)
  # websocket-server:
  #   image: your-websocket-server:latest
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - SERVER_PORT=8081
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

